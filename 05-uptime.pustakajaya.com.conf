<VirtualHost *:80>
    ServerName uptime.pustakajaya.com
    ServerAlias www.uptime.pustakajaya.com

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:3737/
    ProxyPassReverse / http://127.0.0.1:3737/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s

    # ── CORS ──────────────────────────────────────────────
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With"

    RewriteEngine On

    # Handle preflight OPTIONS request
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]
    # ──────────────────────────────────────────────────────

    ErrorLog ${APACHE_LOG_DIR}/uptime.pustakajaya.com-error.log
    CustomLog ${APACHE_LOG_DIR}/uptime.pustakajaya.com-access.log combined
</VirtualHost>